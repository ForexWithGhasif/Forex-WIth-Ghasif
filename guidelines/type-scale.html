<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg-elevated); padding:18px 28px; font-family:var(--font-display); }
  .r { display:flex; align-items:baseline; gap:14px; padding:3px 0; border-bottom:1px solid var(--border-subtle); }
  .r:last-child { border-bottom:0; }
  .s { color:var(--text-primary); font-weight:700; letter-spacing:-.02em; white-space:nowrap; }
  .t { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-left:auto; }
</style>
</head>
<body>
  <div class="r"><span class="s" style="font-size:48px">Aa Conviction</span><span class="t">--text-4xl</span></div>
  <div class="r"><span class="s" style="font-size:34px">Aa Conviction</span><span class="t">--text-2xl</span></div>
  <div class="r"><span class="s" style="font-size:26px">Aa Conviction</span><span class="t">--text-xl</span></div>
  <div class="r"><span class="s" style="font-size:20px">Aa Conviction</span><span class="t">--text-lg</span></div>
  <div class="r"><span class="s" style="font-size:16px;font-weight:500">Aa Conviction body</span><span class="t">--text-base</span></div>
  <div class="r"><span class="s" style="font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-gold)">Aa Eyebrow Kicker</span><span class="t">--text-xs</span></div>
</body>
</html>
