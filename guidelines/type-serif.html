<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg-elevated); padding:24px 30px; font-family:var(--font-serif); display:flex; align-items:center; }
  .q { font-style:italic; font-weight:500; font-size:30px; line-height:1.25; color:var(--text-primary); max-width:30ch; }
  .q b { font-style:italic; color:var(--text-gold); font-weight:600; }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); margin-top:12px; }
</style>
</head>
<body>
  <div>
    <div class="q">"Discipline is the edge. Everything else is <b>noise.</b>"</div>
    <div class="meta">Cormorant Garamond · italic 500 / 600 · --font-serif</div>
  </div>
</body>
</html>
