<!-- @dsCard group="Colors" viewport="700x172" name="Obsidian Ink" subtitle="Warm-cool near-black surface scale for dark mode" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg-elevated); padding:22px; font-family:var(--font-body); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:84px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:8px; border:1px solid var(--border-subtle); }
  .lab { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); letter-spacing:-.02em; }
  .cap { margin-top:12px; font-size:11px; color:var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-950)"><span class="lab">950</span></div>
    <div class="sw" style="background:var(--ink-900)"><span class="lab">900</span></div>
    <div class="sw" style="background:var(--ink-850)"><span class="lab">850</span></div>
    <div class="sw" style="background:var(--ink-800)"><span class="lab">800</span></div>
    <div class="sw" style="background:var(--ink-700)"><span class="lab">700</span></div>
    <div class="sw" style="background:var(--ink-600)"><span class="lab">600</span></div>
    <div class="sw" style="background:var(--ink-500)"><span class="lab">500</span></div>
  </div>
  <div class="cap">--ink-950 = page base · --ink-850 = solid card · steps lift elevation</div>
</body>
</html>
