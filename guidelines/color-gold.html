<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg-elevated); padding:22px; font-family:var(--font-body); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:84px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:8px; box-shadow:var(--inset-top-hi); }
  .lab { font-family:var(--font-mono); font-size:10px; color:rgba(255,255,255,0.9); letter-spacing:-.02em; }
  .lab.dk { color:rgba(0,0,0,0.6); }
  .cap { margin-top:12px; font-size:11px; color:var(--text-tertiary); letter-spacing:.02em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--gold-200)"><span class="lab dk">200</span></div>
    <div class="sw" style="background:var(--gold-300)"><span class="lab dk">300</span></div>
    <div class="sw" style="background:var(--gold-400)"><span class="lab dk">400</span></div>
    <div class="sw" style="background:var(--gold-500)"><span class="lab dk">500</span></div>
    <div class="sw" style="background:var(--gold-600)"><span class="lab">600</span></div>
    <div class="sw" style="background:var(--gold-700)"><span class="lab">700</span></div>
    <div class="sw" style="background:var(--gold-900)"><span class="lab">900</span></div>
  </div>
  <div class="cap">--gold-400 is the core accent · --gold-300 for text on dark</div>
</body>
</html>
