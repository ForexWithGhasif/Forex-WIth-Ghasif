<!-- @dsCard group="Brand" viewport="700x190" name="Metallic Gold & Glow" subtitle="Gradients for metal, text-clip, dividers and hero glow" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg-base); padding:22px 26px; font-family:var(--font-body); }
  .bar { height:34px; border-radius:var(--radius-sm); box-shadow:var(--inset-gold-hi); }
  .gold { background:var(--grad-gold); }
  .soft { background:var(--grad-gold-soft); margin-top:10px; }
  .clip { margin-top:16px; font-family:var(--font-display); font-weight:800; font-size:40px; letter-spacing:-.03em;
          background:var(--grad-gold-soft); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .div { height:1px; margin-top:14px; background:var(--divider-gold); }
  .t { font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); margin-top:6px; }
</style>
</head>
<body>
  <div class="bar gold"></div>
  <div class="t">--grad-gold (metallic)</div>
  <div class="clip">Forex With Ghasif</div>
  <div class="div"></div>
  <div class="t">--grad-gold-soft text-clip · --divider-gold hairline</div>
</body>
</html>
